<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeBuildMaker - ポケモン育成論カード作成・画像出力ツール</title>
  <meta name="description"
    content="【ポケビルドメーカー/PokeBuildMaker】ポケモンの育成論（努力値、個体値、持ち物、技構成、メモ）をオシャレなカード画像として出力できる無料ツール。SNS共有や動画制作の素材に最適。最新ポケモンまで対応。">
  <meta name="keywords" content="ポケモン,育成論,カード作成,画像出力,ポケビルドメーカー,PokeBuildMaker,努力値,個体値,SV">

  <!-- OGP / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="PokeBuildMaker（ポケビルドメーカー）">
  <meta property="og:description" content="ポケモンの育成論をオシャレな1枚の画像に。PokeBuildMaker">
  <meta property="og:image"
    content="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="PokeBuildMaker">
  <meta name="twitter:description" content="ポケモンの育成論をオシャレな1枚の画像にまとめて出力。SNS共有や保存に最適。">

  <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="header">
    <h1 class="header__logo">
      <div class="logo-ball"></div>
      PokeBuildMaker
      <div class="logo-ball" style="animation-delay: 1s;"></div>
    </h1>
  </header>

  <!-- メインレイアウト -->
  <div class="main-layout">

    <!-- 入力フォーム -->
    <aside class="input-panel" id="input-panel">

      <!-- タイトル (100%) -->
      <div class="form-row">
        <div class="form-group row-item" style="flex: 100%;">
          <div class="input-wrapper">
            <input type="text" class="form-group__input" id="subtitle-input" placeholder="育成論タイトル・コンセプト">
          </div>
        </div>
      </div>

      <!-- ポケモン (25%) | 特性 (25%) | 性格 (25%) | 持ち物 (25%) -->
      <div class="form-row">
        <div class="form-group row-item" style="flex: 1 1 calc(25% - 9px);">
          <div class="input-wrapper">
            <button type="button" class="form-group__select btn-modal-trigger" id="btn-select-pokemon">ポケモンを選択</button>
            <button type="button" class="btn-clear" data-target="pokemon" title="クリア">×</button>
          </div>
        </div>
        <div class="form-group row-item" style="flex: 1 1 calc(25% - 9px);">
          <div class="input-wrapper">
            <select class="form-group__select no-arrow" id="ability-select" disabled>
              <option value="">特性を選択</option>
            </select>
            <button type="button" class="btn-clear" data-target="ability" title="クリア">×</button>
          </div>
        </div>
        <div class="form-group row-item" style="flex: 1 1 calc(25% - 9px);">
          <div class="input-wrapper">
            <button type="button" class="form-group__select btn-modal-trigger" id="btn-select-nature">性格を選択</button>
            <button type="button" class="btn-clear" data-target="nature" title="クリア">×</button>
          </div>
        </div>
        <div class="form-group row-item" style="flex: 1 1 calc(25% - 9px);">
          <div class="input-wrapper">
            <button type="button" class="form-group__select btn-modal-trigger" id="btn-select-item">持ち物を選択</button>
            <button type="button" class="btn-clear" data-target="item" title="クリア">×</button>
          </div>
        </div>
      </div>

      <!-- 技構成 (50%) | 努力値 (25%) | 個体値 (25%) -->
      <div class="form-row stats-row" style="flex-wrap: nowrap;">
        <div class="stats-col-left"
          style="flex: 0 0 calc(50% - 6px); display: flex; flex-direction: column; gap: 12px;">
          <div style="display: flex; gap: 12px; align-items: stretch; margin-bottom: 0px;">
            <!-- 努力値 -->
            <div class="form-group row-item ev-group framed-group" style="flex: 1 1 calc(50% - 6px); order: unset;">
              <div class="stats-header" style="min-height: 28px;">
                <span class="stats-title">努力値</span>
                <span class="ev-remaining" id="ev-remaining" style="font-size: 0.75rem;">（残り：510ポイント）</span>
                <button type="button" class="btn-clear text-clear" data-target="evs" title="リセット">リセット</button>
              </div>
              <div class="ev-grid" id="ev-grid" style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                <div class="ev-row"><span class="ev-stat-label">HP</span><span class="stat-val-display"><input
                      type="number" class="ev-input" id="ev-val-hp" value="0" min="0" max="252" step="4"></span><span
                    class="stat-btn-group"><button class="ev-btn ev-jump" data-stat="hp" data-dir="0"
                      type="button">0</button><button class="ev-btn" data-stat="hp" data-dir="-1"
                      type="button">−</button><button class="ev-btn" data-stat="hp" data-dir="1"
                      type="button">＋</button><button class="ev-btn ev-jump" data-stat="hp" data-dir="252"
                      type="button">252</button></span></div>
                <div class="ev-row"><span class="ev-stat-label">こうげき</span><span class="stat-val-display"><input
                      type="number" class="ev-input" id="ev-val-attack" value="0" min="0" max="252"
                      step="4"></span><span class="stat-btn-group"><button class="ev-btn ev-jump" data-stat="attack"
                      data-dir="0" type="button">0</button><button class="ev-btn" data-stat="attack" data-dir="-1"
                      type="button">−</button><button class="ev-btn" data-stat="attack" data-dir="1"
                      type="button">＋</button><button class="ev-btn ev-jump" data-stat="attack" data-dir="252"
                      type="button">252</button></span></div>
                <div class="ev-row"><span class="ev-stat-label">ぼうぎょ</span><span class="stat-val-display"><input
                      type="number" class="ev-input" id="ev-val-defense" value="0" min="0" max="252"
                      step="4"></span><span class="stat-btn-group"><button class="ev-btn ev-jump" data-stat="defense"
                      data-dir="0" type="button">0</button><button class="ev-btn" data-stat="defense" data-dir="-1"
                      type="button">−</button><button class="ev-btn" data-stat="defense" data-dir="1"
                      type="button">＋</button><button class="ev-btn ev-jump" data-stat="defense" data-dir="252"
                      type="button">252</button></span></div>
                <div class="ev-row"><span class="ev-stat-label">とくこう</span><span class="stat-val-display"><input
                      type="number" class="ev-input" id="ev-val-special-attack" value="0" min="0" max="252"
                      step="4"></span><span class="stat-btn-group"><button class="ev-btn ev-jump"
                      data-stat="special-attack" data-dir="0" type="button">0</button><button class="ev-btn"
                      data-stat="special-attack" data-dir="-1" type="button">−</button><button class="ev-btn"
                      data-stat="special-attack" data-dir="1" type="button">＋</button><button class="ev-btn ev-jump"
                      data-stat="special-attack" data-dir="252" type="button">252</button></span></div>
                <div class="ev-row"><span class="ev-stat-label">とくぼう</span><span class="stat-val-display"><input
                      type="number" class="ev-input" id="ev-val-special-defense" value="0" min="0" max="252"
                      step="4"></span><span class="stat-btn-group"><button class="ev-btn ev-jump"
                      data-stat="special-defense" data-dir="0" type="button">0</button><button class="ev-btn"
                      data-stat="special-defense" data-dir="-1" type="button">−</button><button class="ev-btn"
                      data-stat="special-defense" data-dir="1" type="button">＋</button><button class="ev-btn ev-jump"
                      data-stat="special-defense" data-dir="252" type="button">252</button></span></div>
                <div class="ev-row"><span class="ev-stat-label">すばやさ</span><span class="stat-val-display"><input
                      type="number" class="ev-input" id="ev-val-speed" value="0" min="0" max="252" step="4"></span><span
                    class="stat-btn-group"><button class="ev-btn ev-jump" data-stat="speed" data-dir="0"
                      type="button">0</button><button class="ev-btn" data-stat="speed" data-dir="-1"
                      type="button">−</button><button class="ev-btn" data-stat="speed" data-dir="1"
                      type="button">＋</button><button class="ev-btn ev-jump" data-stat="speed" data-dir="252"
                      type="button">252</button></span></div>
              </div>
            </div>
            <!-- 個体値 -->
            <div class="form-group row-item iv-group framed-group" style="flex: 1 1 calc(50% - 6px); order: unset;">
              <div class="stats-header" style="min-height: 28px;">
                <span class="stats-title">個体値</span>
                <div style="display:flex; gap:8px;">
                  <button type="button" class="btn-clear text-clear 6v-btn"
                    style="background: rgba(255,200,100,0.2); border-color: rgba(255,200,100,0.4); color: #ffd166;"
                    data-target="ivs-6v" title="6Vにする">6V</button>
                  <button type="button" class="btn-clear text-clear" data-target="ivs" title="リセット">リセット</button>
                </div>
              </div>
              <div class="iv-grid" id="iv-grid" style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                <div class="iv-row"><span class="ev-stat-label">HP</span><span class="stat-val-display"><input
                      type="number" class="iv-input" id="iv-val-hp" value="0" min="0" max="31"></span><span
                    class="stat-btn-group"><button class="iv-btn iv-jump" data-stat="hp" data-dir="0"
                      type="button">0</button><button class="iv-btn" data-stat="hp" data-dir="-1"
                      type="button">−</button><button class="iv-btn" data-stat="hp" data-dir="1"
                      type="button">＋</button><button class="iv-btn iv-jump" data-stat="hp" data-dir="31"
                      type="button">31</button></span></div>
                <div class="iv-row"><span class="ev-stat-label">こうげき</span><span class="stat-val-display"><input
                      type="number" class="iv-input" id="iv-val-attack" value="0" min="0" max="31"></span><span
                    class="stat-btn-group"><button class="iv-btn iv-jump" data-stat="attack" data-dir="0"
                      type="button">0</button><button class="iv-btn" data-stat="attack" data-dir="-1"
                      type="button">−</button><button class="iv-btn" data-stat="attack" data-dir="1"
                      type="button">＋</button><button class="iv-btn iv-jump" data-stat="attack" data-dir="31"
                      type="button">31</button></span></div>
                <div class="iv-row"><span class="ev-stat-label">ぼうぎょ</span><span class="stat-val-display"><input
                      type="number" class="iv-input" id="iv-val-defense" value="0" min="0" max="31"></span><span
                    class="stat-btn-group"><button class="iv-btn iv-jump" data-stat="defense" data-dir="0"
                      type="button">0</button><button class="iv-btn" data-stat="defense" data-dir="-1"
                      type="button">−</button><button class="iv-btn" data-stat="defense" data-dir="1"
                      type="button">＋</button><button class="iv-btn iv-jump" data-stat="defense" data-dir="31"
                      type="button">31</button></span></div>
                <div class="iv-row"><span class="ev-stat-label">とくこう</span><span class="stat-val-display"><input
                      type="number" class="iv-input" id="iv-val-special-attack" value="0" min="0" max="31"></span><span
                    class="stat-btn-group"><button class="iv-btn iv-jump" data-stat="special-attack" data-dir="0"
                      type="button">0</button><button class="iv-btn" data-stat="special-attack" data-dir="-1"
                      type="button">−</button><button class="iv-btn" data-stat="special-attack" data-dir="1"
                      type="button">＋</button><button class="iv-btn iv-jump" data-stat="special-attack" data-dir="31"
                      type="button">31</button></span></div>
                <div class="iv-row"><span class="ev-stat-label">とくぼう</span><span class="stat-val-display"><input
                      type="number" class="iv-input" id="iv-val-special-defense" value="0" min="0" max="31"></span><span
                    class="stat-btn-group"><button class="iv-btn iv-jump" data-stat="special-defense" data-dir="0"
                      type="button">0</button><button class="iv-btn" data-stat="special-defense" data-dir="-1"
                      type="button">−</button><button class="iv-btn" data-stat="special-defense" data-dir="1"
                      type="button">＋</button><button class="iv-btn iv-jump" data-stat="special-defense" data-dir="31"
                      type="button">31</button></span></div>
                <div class="iv-row"><span class="ev-stat-label">すばやさ</span><span class="stat-val-display"><input
                      type="number" class="iv-input" id="iv-val-speed" value="0" min="0" max="31"></span><span
                    class="stat-btn-group"><button class="iv-btn iv-jump" data-stat="speed" data-dir="0"
                      type="button">0</button><button class="iv-btn" data-stat="speed" data-dir="-1"
                      type="button">−</button><button class="iv-btn" data-stat="speed" data-dir="1"
                      type="button">＋</button><button class="iv-btn iv-jump" data-stat="speed" data-dir="31"
                      type="button">31</button></span></div>
              </div>
            </div>
          </div>
          <!-- コメント -->
          <div class="form-group row-item framed-group"
            style="width: 100%; flex: 1; display: flex; flex-direction: column; margin-right: 0; padding: 16px;">
            <div class="stats-header" style="min-height: 28px; margin-bottom: 12px;">
              <span class="stats-title">メモ</span>
              <div style="display:flex; gap:8px; align-items:center;">
                <span style="font-size: 0.7rem; color: var(--text-secondary); opacity: 0.8;">フォントサイズ</span>
                <div class="stat-btn-group">
                  <button type="button" class="ev-btn" id="btn-memo-font-minus" title="文字を小さく">－</button>
                  <span id="memo-font-display"
                    style="font-size: 0.75rem; font-weight:500; min-width:32px; text-align:center; color:var(--accent);">85%</span>
                  <button type="button" class="ev-btn" id="btn-memo-font-plus" title="文字を大きく">＋</button>
                </div>
              </div>
            </div>
            <div class="input-wrapper" style="flex: 1; display: flex;">
              <textarea class="form-group__textarea" id="notes-input" placeholder="メモ・コメントを入力"
                style="flex: 1; min-height: 120px; margin: 0; padding: 12px; font-size: 0.95rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;"></textarea>
            </div>
          </div>
        </div>

        <div class="stats-col-right"
          style="flex: 0 0 calc(50% - 6px); display: flex; flex-direction: column; gap: 12px;">
          <!-- 技構成 -->
          <div class="form-group row-item moves-group framed-group"
            style="width: 100%; flex: 0 0 auto; display: flex; flex-direction: column;">
            <div class="stats-header" style="min-height: 28px;">
              <span class="stats-title">技構成</span>
            </div>
            <div class="moves-grid-2x2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
              <div class="input-wrapper"><button type="button" class="form-group__select btn-modal-trigger move-btn"
                  id="btn-select-move1" disabled>技1を選択</button><button type="button" class="btn-clear"
                  data-target="move1" title="クリア">×</button></div>
              <div class="input-wrapper"><button type="button" class="form-group__select btn-modal-trigger move-btn"
                  id="btn-select-move2" disabled>技2を選択</button><button type="button" class="btn-clear"
                  data-target="move2" title="クリア">×</button></div>
              <div class="input-wrapper"><button type="button" class="form-group__select btn-modal-trigger move-btn"
                  id="btn-select-move3" disabled>技3を選択</button><button type="button" class="btn-clear"
                  data-target="move3" title="クリア">×</button></div>
              <div class="input-wrapper"><button type="button" class="form-group__select btn-modal-trigger move-btn"
                  id="btn-select-move4" disabled>技4を選択</button><button type="button" class="btn-clear"
                  data-target="move4" title="クリア">×</button></div>
            </div>
          </div>
          <!-- ライブプレビュー -->
          <div class="form-group row-item framed-group"
            style="width: 100%; flex: 0 0 auto; display: flex; flex-direction: column;">
            <div class="stats-header"
              style="min-height: 28px; display: flex; justify-content: space-between; align-items: center;">
              <span class="stats-title">プレビュー</span>
            </div>
            <div class="preview-inner">
              <div class="preview-container" id="preview-container">
                <img id="preview-rendered-img" alt="ポケモン育成論カード — 右クリックまたは長押しで保存" />
                <div class="pokemon-card" id="pokemon-card">
                  <div class="pokemon-card__bg" id="card-bg"></div>
                  <div class="pokemon-card__inner" id="card-inner">
                    <div id="card-content" style="height: 100%; display: flex; flex-direction: column;">
                      <!-- ヘッダー: サブタイトル + ウォーターマーク右上 -->
                      <div class="card-header">
                        <div class="card-title-area">
                          <img
                            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
                            alt="" class="card-header-ball">
                          <div class="card-subtitle" id="card-subtitle"></div>
                        </div>
                        <div class="card-watermark">
                          PokeBuildMaker / ポケビルドメーカー<br>
                          created by @takukodayo
                        </div>
                      </div>
                      <!-- ボディ: 3列×2行グリッド -->
                      <div class="card-body">
                        <!-- 左部カラム -->
                        <div class="card-left-column card-cell">
                          <!-- 左上: スプライト -->
                          <div class="card-sprite-cell">
                            <div class="card-sprite-box">
                              <img id="card-sprite-img" src="" alt="">
                            </div>
                          </div>
                          <!-- 左下: ポケモン名、タイプ、特性、性格、持ち物 -->
                          <div class="card-info-cell">
                            <div class="card-info-header">
                              <div class="card-info-name" id="card-pokemon-name">—</div>
                              <div class="card-info-types" id="card-types"></div>
                            </div>
                            <div class="card-info-group">
                              <div class="card-info-row">
                                <span class="card-info-label">特性</span>
                                <span class="card-info-value" id="card-ability">—</span>
                              </div>
                            </div>
                            <div class="card-info-group">
                              <div class="card-info-row">
                                <span class="card-info-label">性格</span>
                                <span class="card-info-value" id="card-nature">—</span>
                              </div>
                            </div>
                            <div class="card-info-group">
                              <div class="card-info-row">
                                <span class="card-info-label">持ち物</span>
                                <span class="card-info-value"><img id="card-item-img"
                                    class="card-item-icon" onerror="this.style.display='none'" /><span id="card-item-name">—</span></span>
                              </div>
                            </div>
                          </div>
                        </div>

                        <!-- 中央上〜右上: ステータステーブル（合体） -->
                        <div class="card-cell card-stats-cell">
                          <div class="section-title">ステータス</div>
                          <div class="card-stats-container" id="card-stats-container"></div>
                        </div>

                        <!-- 右下コンテナ (ステータス幅と完全一致させるため) -->
                        <div class="card-bottom-right-container">
                          <!-- 技構成 -->
                          <div class="card-cell card-moves-cell">
                            <div class="section-title">技構成</div>
                            <div class="card-moves-grid" id="card-moves"></div>
                          </div>
                          <!-- メモ -->
                          <div class="card-cell card-notes-cell" id="card-notes-area">
                            <div class="section-title">メモ</div>
                            <div class="card-notes-text" id="card-notes-text"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="loading-overlay hidden" id="card-loading">
                    <div class="spinner"></div>
                    <span>データ取得中</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>



    </aside>

  </div>

  <div class="toast" id="toast"></div>

  <!-- モーダル群 -->
  <div class="modal-overlay" id="modal-overlay">

    <div class="modal" id="modal-pokemon">
      <div class="modal-header">
        <h3>ポケモンを選択</h3>
        <button type="button" class="btn-close-modal">×</button>
      </div>
      <div class="modal-search">
        <input type="text" id="pokemon-search-input" placeholder="ポケモン名を入力" autocomplete="off">
      </div>
      <div class="modal-body">
        <div class="modal-grid" id="pokemon-list">
          <div class="modal-search-prompt">ポケモン名を入力して検索してください</div>
        </div>
      </div>
    </div>

    <div class="modal" id="modal-item">
      <div class="modal-header">
        <h3>持ち物を選択</h3>
        <button type="button" class="btn-close-modal">×</button>
      </div>
      <div class="modal-search">
        <input type="text" id="item-search-input" placeholder="アイテム名を入力" autocomplete="off">
      </div>
      <div class="modal-body">
        <div class="modal-grid" id="item-grid">
          <div class="modal-search-prompt">アイテム名を入力して検索してください</div>
        </div>
      </div>
    </div>

    <!-- 性格選択モーダル -->
    <div class="modal" id="modal-nature">
      <div class="modal-header">
        <h3>性格を選択</h3>
        <button type="button" class="btn-close-modal">×</button>
      </div>
      <div class="modal-body" style="padding: 16px;">
        <table class="nature-matrix-table" id="nature-matrix-table"></table>
      </div>
    </div>

    <!-- 技選択モーダル -->
    <div class="modal" id="modal-move">
      <div class="modal-header">
        <h3>技を選択</h3>
        <button type="button" class="btn-close-modal">×</button>
      </div>
      <div class="modal-search">
        <input type="text" id="move-search-input" placeholder="技名で検索" autocomplete="off">
      </div>
      <div class="modal-body">
        <div class="modal-list" id="move-list"></div>
      </div>
    </div>

  </div>



  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/pokemon-names-ja.js"></script>
  <script src="js/item-names-ja.js"></script>
  <script src="js/move-names-ja.js"></script>
  <script src="js/pokeapi.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
